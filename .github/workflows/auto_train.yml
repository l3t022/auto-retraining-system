name: Auto-Train Scheduler

on:
  schedule:
    - cron: '0 9 * * *'  # Ejecuta todos los días a las 09:00 UTC
  workflow_dispatch:      # Permite ejecución manual desde el panel de Actions

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Generate Dummy Data (If needed)
      run: |
        # En caso de que no existan datos reales, se generan datos sintéticos para validar el pipeline
        if [ ! -d "data" ]; then mkdir data; fi
        if [ ! -f "data/train.csv" ]; then python generate_data.py --samples 500 --features 10; fi
        
    - name: Run Auto-Retraining Cycle
      run: |
        # El target puede variar según los datos. Para la demo es target.
        python main.py --mode once --data data/train.csv --target target
