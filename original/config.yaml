# Auto-Retrain System Configuration

# Paths
DATA_PATH: "data/train.csv"
MODEL_PATH: "models/"
LOGS_PATH: "logs/"
BASELINE_PATH: "logs/baseline.json"
METRICS_HISTORY_PATH: "logs/metrics_history.json"

# Model Configuration
MODELS:
  xgboost:
    enabled: true
    objective: "reg:squarederror"  # or "binary:logistic" for classification
    n_trials: 20
    timeout: 300  # 5 minutes per trial
  lightgbm:
    enabled: true
    objective: "regression"  # or "binary" for classification
    n_trials: 20
    timeout: 300

# Hyperparameter Search Space (XGBoost)
XGBOOST_SEARCH_SPACE:
  max_depth:
    type: "int"
    low: 3
    high: 10
  learning_rate:
    type: "float"
    low: 0.01
    high: 0.3
    log: true
  n_estimators:
    type: "int"
    low: 100
    high: 1000
  subsample:
    type: "float"
    low: 0.6
    high: 1.0
  colsample_bytree:
    type: "float"
    low: 0.6
    high: 1.0
  min_child_weight:
    type: "int"
    low: 1
    high: 10
  gamma:
    type: "float"
    low: 0
    high: 0.5

# Hyperparameter Search Space (LightGBM)
LIGHTGBM_SEARCH_SPACE:
  num_leaves:
    type: "int"
    low: 20
    high: 100
  max_depth:
    type: "int"
    low: 3
    high: 10
  learning_rate:
    type: "float"
    low: 0.01
    high: 0.3
    log: true
  n_estimators:
    type: "int"
    low: 100
    high: 1000
  subsample:
    type: "float"
    low: 0.6
    high: 1.0
  colsample_bytree:
    type: "float"
    low: 0.6
    high: 1.0
  min_child_samples:
    type: "int"
    low: 5
    high: 50

# Training Configuration
TRAINING:
  test_size: 0.2
  validation_size: 0.1
  random_state: 42
  cv_folds: 5  # Cross-validation folds

# Retrain Triggers
TRIGGERS:
  # Regresión: Si MSE sube más de threshold, re-entrenar
  mse_threshold: 0.05  # 5%
  # Clasificación: Si accuracy baja más de threshold
  accuracy_threshold: 0.03  # 3%
  # Data drift detection (Kolmogorov-Smirnov test)
  drift_threshold: 0.1
  # Minimum new samples to trigger retrain
  min_new_samples: 10

# Metrics to Track
METRICS:
  regression:
    - "mse"
    - "rmse"
    - "mae"
    - "r2"
  classification:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "auc_roc"

# Scheduling
SCHEDULE:
  enabled: true
  frequency_hours: 24  # Run daily
  # Or use cron: "0 9 * * *" (daily at 9 AM)

# Google Colab Settings
COLAB:
  save_to_drive: true
  checkpoint_frequency: 10  # Save every 10 trials
  max_total_time_minutes: 45